name: publish

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        cache: pip
        python-version: '3.x'
    - name: Install build tools
      run: |
        pip install -U pip
        pip install build
    - name: Build package
      run: |
        pyproject-build --outdir dist/
    - name: Upload package
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: packages
        path: dist/
        if-no-files-found: error
        compression-level: 0

  test:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Download package
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: packages
        path: dist/
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        cache: pip
        python-version: '3.x'
    - name: Update pip
      run: pip install -U pip
    - name: Install package and test requirements
      run: pip install --requirement ./tests/requirements.txt pytest dist/*.whl
    - name: Run unit-tests
      run: pytest -vvra

  release:
    runs-on: ubuntu-latest
    needs: [build, test]
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/proxpi
    steps:
    - name: Download package
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: packages
        path: dist/
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      with:
        print-hash: true
        verbose: true
