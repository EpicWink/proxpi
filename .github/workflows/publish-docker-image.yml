name: publish-docker

on:
  pull_request:
    branches: [master]
    paths:
      - src/**
      - tests/**
      - pyproject.toml
      - setup.py
      - .dockerignore
      - app.requirements.txt
      - Dockerfile
  push:
    branches:
      - master
      - ver/*
    paths:
      - src/**
      - tests/**
      - pyproject.toml
      - setup.py
      - .dockerignore
      - app.requirements.txt
      - Dockerfile
  release:
    types: [created]

env:
  REF_SLUG: ${{ contains(github.ref_name, '/') && github.sha || github.ref_name }}

jobs:
  build-and-test:
    permissions:
      contents: read

    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
        - name: linux/amd64
          image-suffix: amd64
        - name: linux/arm64
          image-suffix: arm64

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up QEMU
      if: ${{ matrix.platform.name != 'linux/amd64' }}
      uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      with:
        platforms: ${{ matrix.platform.name }}

    - name: Set up Docker Buildx to support multiple architectures
      if: ${{ matrix.platform.name != 'linux/amd64' }}
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      with:
        platforms: ${{ matrix.platform.name }}

    - name: Build ${{ matrix.platform.image-suffix }} for testing
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
      with:
        context: .
        load: true
        tags: epicwink/proxpi:${{ env.REF_SLUG }}-${{ matrix.platform.image-suffix }}
        platforms: ${{ matrix.platform.name }}

    - name: Run unit-tests in image for ${{ matrix.platform.image-suffix }}
      run: docker run
        --rm
        --volume "$(pwd)/tests:/srv/tests"
        --entrypoint ''
        "epicwink/proxpi:${REF_SLUG}-${{ matrix.platform.image-suffix }}"
        sh -c 'uname -a && pip install --requirement /srv/tests/requirements.txt
        && pytest -vvra /srv/tests'

    - name: Run image test for ${{ matrix.platform.image-suffix }}
      run: tests/test-docker-image.sh
        "epicwink/proxpi:${REF_SLUG}-${{ matrix.platform.image-suffix }}"
        "${{ matrix.platform.name }}"

  build-and-publish:
    if: ${{ github.event_name == 'release' }}
    needs: ['build-and-test']

    environment: docker-hub

    permissions:
      contents: read

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Docker Buildx to support multiple architectures
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      with:
        platforms: linux/amd64,linux/arm64

    - name: Login to DockerHub
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        username: epicwink
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Build image tag
      id: build-tag
      run: echo "version=$(echo "${GITHUB_REF_NAME}"
        | grep -Po '\d+\.\d+\.\d+(-?(a(lpha)?|b(eta)?|r?c)\.?\d+)?$'
        || echo "${GITHUB_REF_NAME}")"
        >> "$GITHUB_OUTPUT"

    - name: Build and push image for all architectures
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: epicwink/proxpi:${{ steps.build-tag.outputs.version }}

    - name: Check tag
      id: check-tag
      run: |
        if [[ "${GITHUB_REF_NAME}" =~ '^v\d+\.\d+\.\d+$' ]]; then
            echo match=true >> "$GITHUB_OUTPUT"
        fi

    - name: Release image
      if: ${{ github.event_name == 'release' && steps.check-tag.outputs.match == 'true' }}
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: epicwink/proxpi:latest
