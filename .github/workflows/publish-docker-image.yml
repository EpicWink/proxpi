name: publish-docker

on:
  pull_request:
    branches: &ci-branches
      - master
      - ver/*
    paths: &ci-paths
      - src/**
      - tests/**
      - pyproject.toml
      - setup.py
      - .dockerignore
      - app.requirements.txt
      - Dockerfile
      - .github/workflows/publish-docker-image.yml
  push:
    branches: *ci-branches
    paths: *ci-paths
  release:
    types: [created]

env:
  REF_SLUG: ${{ contains(github.ref_name, '/') && github.sha || github.ref_name }}

jobs:
  build-and-test:
    permissions:
      contents: read

    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
        - name: linux/amd64
          image-suffix: amd64
        - name: linux/arm64
          image-suffix: arm64

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up QEMU
      if: ${{ matrix.platform.name != 'linux/amd64' }}
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      with:
        platforms: ${{ matrix.platform.name }}

    - name: Set up Docker Buildx to support multiple architectures
      if: ${{ matrix.platform.name != 'linux/amd64' }}
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      with:
        platforms: ${{ matrix.platform.name }}

    - name: Build ${{ matrix.platform.image-suffix }} for testing
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        load: true
        tags: epicwink/proxpi:${{ env.REF_SLUG }}-${{ matrix.platform.image-suffix }}
        platforms: ${{ matrix.platform.name }}

    - name: Run unit-tests in image for ${{ matrix.platform.image-suffix }}
      run: docker run
        --rm
        --volume "$(pwd)/tests:/srv/tests"
        --entrypoint ''
        "epicwink/proxpi:${REF_SLUG}-${{ matrix.platform.image-suffix }}"
        sh -c 'uname -a && pip install --requirement /srv/tests/requirements.txt
        && pytest -vvra /srv/tests'

    - name: Run image test for ${{ matrix.platform.image-suffix }}
      run: tests/test-docker-image.sh
        "epicwink/proxpi:${REF_SLUG}-${{ matrix.platform.image-suffix }}"
        "${{ matrix.platform.name }}"

  build-and-publish:
    if: ${{ github.event_name == 'release' }}
    needs: ['build-and-test']

    environment: docker-hub

    permissions:
      contents: read

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Docker Buildx to support multiple architectures
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      with:
        platforms: linux/amd64,linux/arm64

    - name: Login to DockerHub
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        username: epicwink
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Build image tag
      id: build-tag
      run: echo "version=$(echo "${GITHUB_REF_NAME}"
        | grep -Po '\d+\.\d+\.\d+(-?(a(lpha)?|b(eta)?|r?c)\.?\d+)?$'
        || echo "${GITHUB_REF_NAME}")"
        >> "$GITHUB_OUTPUT"

    - name: Build and push image for all architectures
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: epicwink/proxpi:${{ steps.build-tag.outputs.version }}

    - name: Release image
      if: ${{ github.event_name == 'release' && github.event.isLatest }}
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: epicwink/proxpi:latest
