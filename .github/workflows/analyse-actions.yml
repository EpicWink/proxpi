name: analyse actions

on:
  pull_request:
    branches:
      - master
    paths: &ci-paths
      - .github/workflows/*
  push:
    branches:
      - master
    paths: *ci-paths

permissions: {}

jobs:
  analyse:
    name: analyse actions
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write # upload-sarif (zizmor)
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
